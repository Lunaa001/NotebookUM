
services:
  notebookum:
    container_name: notebookum
    image: notebookum:1.0.0
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - notebookum-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notebookum=true"
      - "traefik.http.routers.notebookum.rule=Host(`notebookum.local`)"
      - "traefik.http.routers.notebookum.tls=true"
      - "traefik.http.services.notebookum.loadbalancer.server.port=8000"

networks:
  notebookum-network:
    external: true